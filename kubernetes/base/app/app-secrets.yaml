apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: school-management
  labels:
    app: school-app
type: Opaque
stringData:
  APP_KEY: ""  # Will be populated during deployment
  DB_DATABASE: "school_management"
  DB_USERNAME: "school_user"
  DB_PASSWORD: ""  # Will be populated during deployment
  DB_ROOT_PASSWORD: ""  # Will be populated during deployment
  REDIS_PASSWORD: ""  # Will be populated during deployment
  CACHE_REDIS_PASSWORD: ""  # Will be populated during deployment
  MAIL_USERNAME: ""  # Will be populated during deployment
  MAIL_PASSWORD: ""  # Will be populated during deployment
  MIDTRANS_SERVER_KEY: ""  # Will be populated during deployment
  MIDTRANS_CLIENT_KEY: ""  # Will be populated during deployment
  AWS_ACCESS_KEY_ID: ""  # Optional: Will be populated during deployment
  AWS_SECRET_ACCESS_KEY: ""  # Optional: Will be populated during deployment
  AWS_DEFAULT_REGION: "ap-southeast-1"
  AWS_BUCKET: ""  # Optional: Will be populated during deployment
