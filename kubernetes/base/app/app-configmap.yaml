apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: school-management
  labels:
    app: school-app
data:
  APP_NAME: "ProductSchool"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://school.yourdomain.com"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "info"
  DB_CONNECTION: "mysql"
  DB_HOST: "school-mysql.school-management.svc.cluster.local"
  DB_PORT: "3306"
  CACHE_DRIVER: "redis"
  CACHE_HOST: "school-redis.school-management.svc.cluster.local"
  CACHE_PORT: "6379"
  CACHE_PREFIX: "school_"
  SESSION_DRIVER: "redis"
  SESSION_CONNECTION: "default"
  SESSION_LIFETIME: "120"
  QUEUE_CONNECTION: "redis"
  QUEUE_HOST: "school-redis.school-management.svc.cluster.local"
  QUEUE_PORT: "6379"
  BROADCAST_DRIVER: "reverb"
  BROADCAST_CONNECTION: "default"
  REVERB_HOST: "reverb.school.yourdomain.com"
  REVERB_PORT: "443"
  REVERB_SCHEME: "https"
  MAIL_DRIVER: "smtp"
  MAIL_HOST: "smtp.mailtrapp.com"
  MAIL_PORT: "465"
  MAIL_ENCRYPTION: "tls"
  LOCALE: "id_ID"
  APP_TIMEZONE: "Asia/Jakarta"
  FILESYSTEM_DISK: "local"
