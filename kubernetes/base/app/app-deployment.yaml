apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-app
  namespace: school-management
  labels:
    app: school-app
spec:
  replicas: 1  # Override in overlays
  selector:
    matchLabels:
      app: school-app
  template:
    metadata:
      labels:
        app: school-app
    spec:
      serviceAccountName: school-app-sa
      containers:
        - name: app
          image: "{{ REGISTRY }}/school-app:latest"  # Override in overlays
          imagePullPolicy: IfNotPresent
          ports:
            - name: fastcgi
              containerPort: 9000
              protocol: TCP
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_NAME
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_ENV
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DEBUG
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_URL
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APP_KEY
            - name: LOG_CHANNEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_CHANNEL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: DB_CONNECTION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_CONNECTION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: CACHE_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CACHE_DRIVER
            - name: CACHE_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CACHE_HOST
            - name: CACHE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CACHE_PORT
            - name: CACHE_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CACHE_PREFIX
            - name: CACHE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CACHE_REDIS_PASSWORD
            - name: SESSION_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SESSION_DRIVER
            - name: SESSION_LIFETIME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SESSION_LIFETIME
            - name: QUEUE_CONNECTION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: QUEUE_CONNECTION
            - name: LOCALE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOCALE
            - name: APP_TIMEZONE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_TIMEZONE
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: fastcgi
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "php-fpm -t"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: storage
              mountPath: /app/storage
            - name: cache
              mountPath: /app/bootstrap/cache
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "cd /app && php artisan migrate --force && php artisan cache:clear && php artisan config:cache && php artisan route:cache"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: app-storage-pvc
        - name: cache
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
