apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: school-mysql
  namespace: school-management
  labels:
    app: school-mysql
spec:
  serviceName: school-mysql
  replicas: 1  # Override in overlays for production replication
  selector:
    matchLabels:
      app: school-mysql
  template:
    metadata:
      labels:
        app: school-mysql
    spec:
      initContainers:
        - name: copy-config
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              cp /source-config/my.cnf /etc/mysql/conf.d/my.cnf
          volumeMounts:
            - name: config
              mountPath: /source-config
            - name: config-dest
              mountPath: /etc/mysql/conf.d
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_ROOT_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysqladmin ping -h127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} > /dev/null 2>&1
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysqladmin ping -h127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} > /dev/null 2>&1
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config-dest
              mountPath: /etc/mysql/conf.d
      volumes:
        - name: config
          configMap:
            name: mysql-config
        - name: config-dest
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: school-mysql
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi  # Override in overlays
