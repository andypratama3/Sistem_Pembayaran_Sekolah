apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data-pvc
  namespace: school-management
  labels:
    app: school-mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi  # Override in overlays for staging/production
  # storageClassName: persistent  # Override in overlays
