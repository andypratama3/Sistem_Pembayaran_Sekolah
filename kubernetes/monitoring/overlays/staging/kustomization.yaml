apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: monitoring-staging

namespace: monitoring

bases:
  - ../../base

namePrefix: staging-

replicas:
  - name: prometheus-monitoring
    count: 2
  - name: grafana
    count: 1
  - name: loki
    count: 1

commonLabels:
  environment: staging

patches:
  # Prometheus resource limits
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: staging-prometheus-monitoring
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

  # Grafana resource limits
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: staging-grafana
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  # Loki resource limits
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: staging-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  # Prometheus storage
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: staging-prometheus-storage-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 50Gi

  # Grafana storage
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: staging-grafana-storage-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi

  # Loki storage
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: staging-loki-storage-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 20Gi
