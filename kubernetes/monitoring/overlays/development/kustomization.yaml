apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: monitoring-development

namespace: monitoring

bases:
  - ../../base

namePrefix: dev-

replicas:
  - name: prometheus-monitoring
    count: 1
  - name: grafana
    count: 1
  - name: loki
    count: 1

commonLabels:
  environment: development

patches:
  # Prometheus resource limits
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dev-prometheus-monitoring
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  # Grafana resource limits
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dev-grafana
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi

  # Loki resource limits
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dev-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi

  # Prometheus storage
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: dev-prometheus-storage-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 10Gi

  # Grafana storage
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: dev-grafana-storage-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 1Gi

  # Loki storage
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: dev-loki-storage-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 5Gi
