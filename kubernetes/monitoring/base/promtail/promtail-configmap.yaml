apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
  labels:
    app: promtail
    project: school-management
data:
  promtail-config.yaml: |
    client:
      backoff_config:
        
      batchwait: 1s
      batchsize: 1048576
      external_labels:
        cluster: school-management
      timeout: 10s
      url: http://loki:3100/loki/api/v1/push

    positions:
      filename: /tmp/positions.yaml

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Drop kube-system namespace and monitoring namespace (optional, to avoid noise)
          - source_labels: [ __meta_kubernetes_namespace ]
            regex: 'kube-system|kube-.*|kube-node-lease'
            action: drop

          # Get namespace label
          - source_labels: [ __meta_kubernetes_namespace ]
            target_label: namespace

          # Get pod name label
          - source_labels: [ __meta_kubernetes_pod_name ]
            target_label: pod_name

          # Get pod label "app" as job
          - source_labels: [ __meta_kubernetes_pod_label_app ]
            target_label: app

          # Get pod label "environment" if exists
          - source_labels: [ __meta_kubernetes_pod_label_environment ]
            target_label: environment
            regex: (.+)

          # Get container name
          - source_labels: [ __meta_kubernetes_pod_container_name ]
            target_label: container

          # Get pod label "component" if exists
          - source_labels: [ __meta_kubernetes_pod_label_component ]
            target_label: component
            regex: (.+)

          # Set the path
          - source_labels: [ __meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name ]
            action: replace
            target_label: __path__
            regex: '(.+);(.+)'
            replacement: '/var/log/pods/*${1}/*${2}/*.log'

      - job_name: system
        static_configs:
          - targets:
              - localhost
            labels:
              job: system
              __path__: /var/log/*.log
