apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-rbac
  namespace: monitoring
  labels:
    app: prometheus
    project: school-management
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-sd-reader
  labels:
    app: prometheus
    project: school-management
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-sd-reader
  labels:
    app: prometheus
    project: school-management
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-sd-reader
subjects:
  - kind: ServiceAccount
    name: prometheus-rbac
    namespace: monitoring
