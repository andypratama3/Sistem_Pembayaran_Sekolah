apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    project: school-management
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage-pvc
  namespace: monitoring
  labels:
    app: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi  # Overridden per environment
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-password
  namespace: monitoring
  labels:
    app: grafana
type: Opaque
stringData:
  password: "admin123"  # CHANGE THIS IN PRODUCTION!
