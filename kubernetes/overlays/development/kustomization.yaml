apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: school-management-dev

namespace: school-management

bases:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

replicas:
  - name: school-app
    count: 1
  - name: school-mysql
    count: 1
  - name: school-redis
    count: 1

images:
  - name: "{{ REGISTRY }}/school-app"
    newName: productsschool-app
    newTag: "latest"

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dev-school-app
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: dev-school-mysql
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: dev-mysql-data-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 50Gi
