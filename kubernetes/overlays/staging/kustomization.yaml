apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: school-management-staging

namespace: school-management

bases:
  - ../../base

namePrefix: staging-

replicas:
  - name: school-app
    count: 2
  - name: school-mysql
    count: 1
  - name: school-redis
    count: 1

images:
  - name: "{{ REGISTRY }}/school-app"
    newTag: "staging"

commonLabels:
  environment: staging

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: staging-school-app
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: staging-school-mysql
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: staging-mysql-data-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 100Gi
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: staging-app-storage-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 20Gi
  - target:
      group: v1
      kind: PersistentVolumeClaim
      name: staging-redis-data-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 20Gi
