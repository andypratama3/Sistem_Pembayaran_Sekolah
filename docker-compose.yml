x-app-base: &app-base
  build:
    context: .
    dockerfile: docker/Dockerfile
    args:
      - APP_ENV=${APP_ENV:-production}
  restart: unless-stopped
  working_dir: /app
  env_file: ./src/.env
  networks:
    - schoolapp
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  app:
    <<: *app-base
    container_name: schoolapp_app
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["php-fpm"]
    volumes:
      - app_storage:/app/storage
      - ./src/.env:/app/.env
    environment:
      - PHP_FPM_PM=dynamic
      - PHP_FPM_MAX_CHILDREN=50
      - PHP_FPM_START_SERVERS=10
      - PHP_FPM_MIN_SPARE_SERVERS=5
      - PHP_FPM_MAX_SPARE_SERVERS=15
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: nginx:1.27-alpine
    container_name: schoolapp_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/conf.d/monitoring.conf:/etc/nginx/conf.d/monitoring.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - app_storage:/app/storage:ro
      - certbot_webroot:/var/www/certbot:ro
      - ./src/public:/app/public:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - schoolapp
      - minikube
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:8.0
    container_name: schoolapp_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-school_management}
      MYSQL_USER: ${DB_USERNAME:-schooluser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-schoolpass123}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass123}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - schoolapp
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootpass123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=256M
      - --innodb_buffer_pool_size=256M

  redis:
    image: redis:7-alpine
    container_name: schoolapp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123} --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - schoolapp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: schoolapp_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - ./docker/ssl:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - schoolapp

  prometheus:
    image: prom/prometheus:latest
    container_name: schoolapp_prometheus
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - schoolapp

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: schoolapp_mysql_exporter
    environment:
      - DATA_SOURCE_NAME=schooluser:${DB_PASSWORD}@tcp(db:3306)/school_management
    networks:
      - schoolapp
    depends_on:
      db:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: schoolapp_redis_exporter
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - schoolapp
    depends_on:
      redis:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: schoolapp_nginx_exporter
    command:
      - -nginx.scrape-uri=http://web:80/stub_status
    networks:
      - schoolapp
    depends_on:
      web:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:latest
    container_name: schoolapp_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - schoolapp

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: schoolapp_cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - schoolapp

  grafana:
    image: grafana/grafana-oss:latest
    container_name: schoolapp_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=https://grafana.school.andypratama.studio
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./kubernetes/monitoring/base/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - schoolapp

  loki:
    image: grafana/loki:latest
    container_name: schoolapp_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - schoolapp

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  certbot_webroot:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  schoolapp:
    driver: bridge
    name: schoolapp_network
  minikube:
    name: minikube
    external: true
